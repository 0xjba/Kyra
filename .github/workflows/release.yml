name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm install

      - name: Debug - Build manually first
        run: npx tauri build --target aarch64-apple-darwin --verbose 2>&1 || true

      - name: Debug - List bundle output
        run: |
          echo "=== Listing target dir ==="
          find src-tauri/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || echo "No bundle dir found"
          echo "=== Listing release dir ==="
          ls -la src-tauri/target/aarch64-apple-darwin/release/ 2>/dev/null | head -20
          echo "=== Checking for any .dmg ==="
          find src-tauri/target -name "*.dmg" 2>/dev/null || echo "No .dmg found"
          echo "=== Checking for any .app ==="
          find src-tauri/target -name "*.app" -type d 2>/dev/null || echo "No .app found"
