name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Kyra v__VERSION__"
          releaseBody: |
            Nine lives for your storage.

            **What's included:**
            - **Clean** — Remove system caches, logs, browser data, and orphaned app files
            - **Prune** — Bulk-delete developer artifacts (node_modules, target, __pycache__)
            - **Installers** — Find leftover .dmg, .pkg, and .iso files
            - **Uninstall** — Fully remove apps with all associated files
            - **Optimize** — System maintenance tasks (DNS flush, LaunchServices rebuild, etc.)
            - **Analyze** — Treemap disk visualizer, large file finder, duplicate detector
            - **Status** — Real-time CPU, memory, disk, and network monitoring
            - **Ask AI** — Get advice from ChatGPT on what's safe to delete

            **Requirements:** macOS 11+ · Apple Silicon (M1/M2/M3/M4)

            > **Note:** This release is not yet notarized by Apple. On first launch, right-click the app → Open → Open.
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin
